name: Build Custom Raspberry Pi Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag for the built image (defaults to pi-image-YYYYMMDD-runN)"
        required: false
        type: string

permissions:
  contents: write
  deployments: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    environment: pi-images
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag_name }}" ]; then
            tag="${{ inputs.tag_name }}"
          else
            tag="pi-image-$(date -u +%Y%m%d)-run${{ github.run_number }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Create deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: pi-images
          ref: ${{ github.sha }}
          description: Custom Raspberry Pi OS image build

      - name: Resolve Latest Raspberry Pi OS URL
        id: resolve-url
        run: |
          echo "Finding latest official Raspberry Pi OS Lite..."
          LATEST_DIR=$(curl -s https://downloads.raspberrypi.com/raspios_lite_arm64/images/ | grep -oE 'raspios_lite_arm64-[0-9]{4}-[0-9]{2}-[0-9]{2}/' | uniq | tail -n 1)
          IMG_NAME=$(curl -s "https://downloads.raspberrypi.com/raspios_lite_arm64/images/${LATEST_DIR}" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}-raspios-[a-z]+-arm64-lite.img.xz' | head -n 1)
          URL="https://downloads.raspberrypi.com/raspios_lite_arm64/images/${LATEST_DIR}${IMG_NAME}"
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Setup QEMU for ARM Emulation
        uses: docker/setup-qemu-action@v3

      - name: Modify Raspberry Pi Image
        uses: dtcooper/rpi-image-modifier@v1
        with:
          base-image-url: ${{ steps.resolve-url.outputs.url }}
          script-path: deploy/image-setup.sh
          env-vars: PI_USERNAME,PI_PASSWORD
        env:
          PI_USERNAME: ${{ secrets.PI_USERNAME }}
          PI_PASSWORD: ${{ secrets.PI_PASSWORD }}

      - name: Compress Custom Image
        run: |
          mv rpi-os-modified.img driverio-custom-raspios-lite.img
          xz -9 driverio-custom-raspios-lite.img

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: driverio-custom-raspios-lite-${{ steps.release.outputs.tag }}
          path: driverio-custom-raspios-lite.img.xz
          retention-days: 90

      - name: Upload image to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Raspberry Pi Image ${{ steps.release.outputs.tag }}
          files: driverio-custom-raspios-lite.img.xz
          generate_release_notes: ${{ github.event_name == 'workflow_dispatch' }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark deployment success
        uses: chrnorm/deployment-status@v2
        if: success()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}
          description: Published driverio-custom-raspios-lite.img.xz

      - name: Mark deployment failure
        uses: chrnorm/deployment-status@v2
        if: failure() && steps.deployment.outputs.deployment_id != ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
          description: Image build or release upload failed
